; PgBouncer — 3000 app connections → 100 DB connections
; NOT ACTIVE until Day 31. Dev connects directly to PostgreSQL.
; Activate: add to docker-compose, change DATABASE_URL port to 6432.
;
; pool_mode=transaction: no SET commands between queries.
; Enforce user isolation in app code (WHERE user_id=$1), not RLS.

[databases]
vikileads = host=127.0.0.1 port=5432 dbname=vikileads

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt
pool_mode = transaction
default_pool_size = 100
max_client_conn = 3000
reserve_pool_size = 10
server_idle_timeout = 300
query_timeout = 30
